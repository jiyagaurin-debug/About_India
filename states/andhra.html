<h1>Andhra Pradesh</h1>
<img src="state_pics/andhra.jpg" alt="Andhra Pradesh" width="400">
<p>Andhra Pradesh is a state in southeastern India. Its capital is Amaravati.</p>
<p>It is known for agriculture, Tirupati Temple, and a long coastline.</p>
<p>Telugu is the official language of Andhra Pradesh.</p>
