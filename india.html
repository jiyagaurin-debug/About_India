    <p id="coords">Coordinates will appear here</p>

    <script>
        const display = document.getElementById('coords');
        const img = document.getElementById('indiaMap');

        img.addEventListener('mousemove', function(event) {
            const rect = img.getBoundingClientRect();

            const x = Math.round(event.clientX - rect.left);
            const y = Math.round(event.clientY - rect.top);

            display.innerText = `Mouse Position on Image: X=${x}, Y=${y}`;
        });

        img.addEventListener('click', function(event) {
            const rect = img.getBoundingClientRect();

            const x = Math.round(event.clientX - rect.left);
            const y = Math.round(event.clientY - rect.top);

            display.innerText = `Clicked Point: ${x},${y}`;
        });
    </script>
